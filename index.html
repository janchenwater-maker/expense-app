<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧報帳系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d24;
            --border: #2a2d35;
            --text: #e8e6e0;
            --muted: #6b7280;
            --blue: #4f8ef7;
            --green: #10b981;
            --purple: #a78bfa;
            --amber: #f59e0b;
            --red: #ef4444;
            --sidebar-w: 220px;
            --header-h: 64px;
            --nav-h: 60px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --safe-t: env(safe-area-inset-top, 0px);
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            height: calc(var(--header-h) + var(--safe-t));
            padding-top: var(--safe-t);
            background: rgba(15,17,23,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding-left: 20px;
            padding-right: 20px;
            gap: 16px;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .header-title {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
        }
        .header-sub {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
        }
        .header-spacer {
            flex: 1;
        }
        .header-total {
            text-align: right;
        }
        .header-total-label {
            font-size: 10px;
            color: var(--muted);
        }
        .header-total-val {
            font-size: 16px;
            font-weight: 700;
            color: var(--blue);
        }
        .header-tabs {
            display: none;
            gap: 4px;
            background: var(--card);
            border-radius: 10px;
            padding: 4px;
        }
        .header-tab {
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: var(--muted);
            border-radius: 7px;
            padding: 7px 18px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .header-tab.active {
            background: var(--blue);
            color: #fff;
            font-weight: 700;
        }
        .layout {
            display: flex;
            padding-top: calc(var(--header-h) + var(--safe-t));
            min-height: 100dvh;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            padding-bottom: var(--safe-b);
        }
        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 3px;
            transition: color 0.2s;
        }
        .nav-btn.active {
            color: var(--blue);
        }
        .nav-icon {
            font-size: 20px;
        }
        .nav-label {
            font-size: 10px;
            font-weight: 500;
        }
        .page-wrap {
            flex: 1;
            min-width: 0;
            padding-bottom: calc(var(--nav-h) + var(--safe-b) + 8px);
            overflow-y: auto;
        }
        .page-content {
            display: none;
        }
        .page-content.active {
            display: block;
        }
        @media (min-width: 768px) {
            .header-tabs {
                display: flex;
            }
            .bottom-nav {
                display: none;
            }
            .layout {
                max-width: 1100px;
                margin: 0 auto;
                padding: 0;
                padding-top: calc(var(--header-h) + var(--safe-t) + 24px);
            }
            .page-wrap {
                padding-bottom: 40px;
                padding-left: 24px;
                padding-right: 24px;
            }
            .scan-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                align-items: start;
            }
            .record-card {
                flex-direction: row;
            }
            .kpi-grid {
                grid-template-columns: repeat(4, 1fr) !important;
            }
        }
        .section {
            padding: 16px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 14px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: opacity 0.15s, transform 0.1s;
            -webkit-appearance: none;
        }
        .btn:active {
            opacity: 0.75;
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #6366f1);
            color: #fff;
            padding: 11px 20px;
            font-size: 14px;
        }
        .btn-camera {
            background: var(--green);
            color: #fff;
            padding: 11px 20px;
            font-size: 14px;
        }
        .btn-success {
            background: var(--green);
            color: #fff;
            padding: 9px 16px;
            font-size: 13px;
        }
        .btn-danger {
            background: var(--red);
            color: #fff;
            padding: 7px 12px;
            font-size: 12px;
        }
        .btn-ghost {
            background: var(--border);
            color: var(--text);
            padding: 7px 12px;
            font-size: 12px;
        }
        .btn-export {
            background: var(--green);
            color: #fff;
            padding: 13px 28px;
            font-size: 15px;
            font-weight: 700;
            width: 100%;
            border-radius: 12px;
        }
        .badge {
            display: inline-block;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
            margin: 2px 2px 2px 0;
        }
        .badge-blue { background: #4f8ef722; color: var(--blue); }
        .badge-purple { background: #a78bfa22; color: var(--purple); }
        .badge-green { background: #10b98122; color: var(--green); }
        .badge-amber { background: #f59e0b22; color: var(--amber); }
        .badge-red { background: #ef444422; color: var(--red); }
        .badge-gray { background: #6b728022; color: var(--muted); }
        .form-field {
            margin-bottom: 14px;
        }
        .form-label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-input, .form-select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 13px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--blue);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .empty {
            text-align: center;
            padding: 56px 24px;
            color: var(--muted);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-text {
            font-size: 14px;
            line-height: 1.7;
        }
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 18px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: var(--card);
        }
        .drop-zone:hover, .drop-zone.over {
            border-color: var(--blue);
            background: #1e2130;
        }
        .drop-icon { font-size: 52px; margin-bottom: 12px; }
        .drop-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
        .drop-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .applicant-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }
        .applicant-bar label {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            font-weight: 600;
        }
        .applicant-bar input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .applicant-bar input:focus { border-color: var(--blue); }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .queue-header h3 { font-size: 13px; color: var(--muted); font-weight: 600; }
        .scanning-pulse {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--amber);
            font-size: 12px;
            font-weight: 600;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--amber);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        .queue-card {
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .queue-img { width: 100%; height: 170px; object-fit: cover; display: block; }
        .queue-body { padding: 14px; }
        .queue-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .queue-vendor { font-size: 15px; font-weight: 700; }
        .queue-amount { font-size: 18px; font-weight: 700; color: var(--blue); }
        .confirm-sticky {
            position: sticky;
            bottom: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 12px 16px calc(12px + var(--safe-b));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .confirm-info { font-size: 13px; color: var(--muted); }
        .confirm-info strong { color: var(--green); font-size: 15px; }
        @media (min-width: 768px) {
            .queue-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
            .queue-img { height: 160px; }
            .confirm-sticky { position: static; border-top: none; padding: 0; margin-top: 16px; justify-content: flex-end; }
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-select {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            outline: none;
        }
        .record-summary { padding: 0 16px 10px; font-size: 13px; color: var(--muted); display: flex; justify-content: flex-end; }
        .record-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            margin: 0 16px 10px;
            overflow: hidden;
            display: flex;
        }
        .record-thumb { width: 76px; object-fit: cover; flex-shrink: 0; display: block; }
        .record-nothumb { width: 76px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
        .record-body { flex: 1; padding: 12px; min-width: 0; }
        .record-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .record-vendor { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 55%; }
        .record-amount { font-size: 16px; font-weight: 700; color: var(--blue); flex-shrink: 0; }
        .record-desc { font-size: 12px; color: #9ca3af; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .record-foot { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .record-meta { font-size: 11px; color: var(--muted); }
        .record-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 4px 6px; border-radius: 6px; }
        .icon-btn:hover { background: var(--border); }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 14px; }
        .kpi-card { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); text-align: center; }
        .kpi-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 6px; }
        .kpi-val { font-size: 18px; font-weight: 700; }
        .bar-row { margin-bottom: 14px; }
        .bar-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        .bar-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
        .bar-info { color: var(--muted); flex-shrink: 0; }
        .bar-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 4px; transition: width 0.6s ease; }
        .month-grid { display: flex; gap: 8px; align-items: flex-end; height: 80px; }
        .month-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .month-bar { width: 100%; background: linear-gradient(180deg, var(--blue), #6366f1); border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.5s ease; }
        .month-lbl { font-size: 10px; color: var(--muted); }
        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 28px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
        .employee-tag {
            font-size: 12px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .logout-btn:hover { border-color: var(--red); color: var(--red); }
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-sheet {
            background: var(--card);
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-height: 88dvh;
            overflow-y: auto;
            padding: 20px 20px calc(20px + var(--safe-b));
        }
        .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .modal-actions .btn { flex: 1; padding: 13px; font-size: 14px; }
        @media (min-width: 768px) {
            .modal-overlay { align-items: center; }
            .modal-sheet { border-radius: 18px; max-width: 520px; max-height: 80vh; }
            .modal-handle { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">
            <div class="header-icon">🧾</div>
            <div>
                <div class="header-title">智慧報帳系統</div>
                <div class="header-sub">AI EXPENSE SCANNER</div>
            </div>
        </div>
        <div class="header-spacer"></div>
        <div id="headerTabs" class="header-tabs">
            <button class="header-tab active" onclick="switchTab('scan')">📷 掃描上傳</button>
            <button class="header-tab" onclick="switchTab('records')">📋 報帳記錄</button>
            <button class="header-tab" onclick="switchTab('stats')">📊 統計匯出</button>
        </div>
        <div id="employeeTag" class="employee-tag">
            <span id="employeeLabel"></span>
            <button class="logout-btn" onclick="doLogout()">登出</button>
        </div>
        <div class="header-total">
            <div class="header-total-label">本月累計</div>
            <div class="header-total-val" id="headerTotal">NT$ 0</div>
        </div>
    </div>

    <div class="layout">
        <div class="page-wrap">
            <!-- SCAN PAGE -->
            <div id="pageScan" class="page-content active">
                <div class="section">
                    <div class="scan-grid">
                        <div>
                            <div class="card">
                                <div class="card-title">申請人</div>
                                <div class="applicant-bar">
                                    <label>名稱</label>
                                    <input type="text" id="applicantInput" placeholder="輸入姓名">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">📸 拍照或上傳憑證</div>
                        <div class="drop-zone" id="dropZone">
                            <div class="drop-icon">📷</div>
                            <div class="drop-title">拖曳或點擊上傳</div>
                            <div class="drop-sub">
                                AI 自動辨識金額、商家、科目<br>
                                支援 JPG、PNG，可一次多張
                            </div>
                            <div class="btn-row">
                                <button class="btn btn-camera" onclick="event.stopPropagation(); document.getElementById('cameraInput').click()">📷 直接拍照</button>
                                <button class="btn btn-camera" onclick="event.stopPropagation(); document.getElementById('galleryInput').click()">🖼️ 從相簿選取</button>
                            </div>
                        </div>
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
                        <input type="file" id="galleryInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
                    </div>

                    <div id="queueSection" style="display:none">
                        <div class="queue-header">
                            <h3 id="queueTitle">掃描佇列</h3>
                            <div id="scanPulse" class="scanning-pulse" style="display:none">
                                <div class="pulse-dot"></div>
                                AI 辨識中
                            </div>
                        </div>
                        <div id="queueList"></div>
                        <div class="confirm-sticky" id="confirmBar" style="display:none">
                            <div class="confirm-info">
                                已完成 <strong id="doneCount">0</strong> 張辨識
                            </div>
                            <button class="btn btn-success" onclick="confirmAll()">✓ 全部加入記錄</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RECORDS PAGE -->
            <div id="pageRecords" class="page-content">
                <div class="filter-bar" id="filterBar">
                    <select id="filterMonth" class="filter-select" onchange="renderRecords()">
                        <option>全部月份</option>
                    </select>
                    <select id="filterCat" class="filter-select" onchange="renderRecords()">
                        <option>全部科目</option>
                    </select>
                </div>
                <div class="record-summary" id="recordSummary"></div>
                <div id="recordList"></div>
            </div>

            <!-- STATS PAGE -->
            <div id="pageStats" class="page-content">
                <div class="section">
                    <div style="margin-bottom:16px">
                        <label class="form-label">篩選月份</label>
                        <select id="statsMonth" class="filter-select" style="width:100%" onchange="renderStats()">
                            <option>全部月份</option>
                        </select>
                    </div>

                    <div id="kpiGrid" class="kpi-grid"></div>

                    <div class="card">
                        <div class="card-title">費用科目分布</div>
                        <div id="catBars"></div>
                    </div>

                    <div class="card" id="monthCard" style="display:none">
                        <div class="card-title">月份趨勢</div>
                        <div id="monthBars" class="month-grid"></div>
                    </div>

                    <button id="exportBtn" class="btn-export" onclick="exportExcel()">📥 匯出 Excel 給財務</button>
                    <button class="btn-export" style="margin-top:10px;background:#4f8ef7" onclick="syncAllToSheet()">☁️ 手動同步到 Google 試算表</button>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal-overlay" style="display:none" onclick="closeModal()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>

    <script>
        // ════ Constants ════
        const CATS = ["薪資費用","旅費","交通費","交際費","伙食費","租金費用","水電費","郵電費","文具用品費","廣告費","修繕費","保險費","訓練費","勞務費","研究發展費用","雜費","其他"];
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyYmNorlr408B1HgT4VBfmHUPQrl5WO6qI7MsydUqiz-dsQTWrnOdgPNbKMuN3tW0ZB/exec';

        // ════ State ════
        let records = JSON.parse(localStorage.getItem('xp_records') || '[]');
        let queue = [];
        let currentEmployee = localStorage.getItem('xp_employee') || '';

        // ════ Persistence ════
        function save() {
            localStorage.setItem('xp_records', JSON.stringify(records));
            updateTotal();
        }

        function fmt(n) {
            return Number(n||0).toLocaleString('zh-TW');
        }

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        function monthOf(m) {
            if(!m) return '';
            const[y,mo]=m.split('-');
            return y+'年'+mo+'月';
        }

        function updateTotal() {
            const mo = new Date().toISOString().slice(0,7);
            const t = records.filter(r=>
                (!currentEmployee || r.applicant === currentEmployee) &&
                r.date?.startsWith(mo)
            ).reduce((s,r)=>s+Number(r.amount||0),0);
            document.getElementById('headerTotal').textContent = 'NT$ '+fmt(t);
        }

        // ════ Tab switching ════
        function switchTab(tab) {
            const tabs = ['scan','records','stats'];
            tabs.forEach(t => {
                const content = document.getElementById('page'+t.charAt(0).toUpperCase()+t.slice(1));
                if(content) content.classList.toggle('active', t===tab);

                const navBtn = document.getElementById('nav-'+t);
                if(navBtn) navBtn.classList.toggle('active', t===tab);

                const headerTab = document.querySelector('#headerTabs .header-tab:nth-child(' + ({'scan':1,'records':2,'stats':3}[t]) + ')');
                if(headerTab) headerTab.classList.toggle('active', t===tab);
            });

            if(tab==='records') { buildFilters(); renderRecords(); }
            if(tab==='stats') { buildStatsFilter(); renderStats(); }
        }

        // ════ File handling ════
        async function handleFiles(files) {
            const imgs = Array.from(files).filter(f=>f.type.startsWith('image/'));
            if(!imgs.length) return;

            document.getElementById('queueSection').style.display='block';
            document.getElementById('confirmBar').style.display='none';
            document.getElementById('scanPulse').style.display='flex';

            for(const file of imgs) {
                const id = Date.now()+Math.random();
                const preview = URL.createObjectURL(file);
                const item = {id, file, preview, status:'scanning', result:null};
                queue.push(item);
                addQueueCard(item);

                try {
                    const compressed = await compressImage(file);
                    const b64 = await toBase64(compressed);
                    const result = await aiScan(b64, 'image/jpeg');
                    const q = queue.find(x=>x.id===id);
                    if(q){q.status='done';q.result=result;}
                    updateQueueCard(id,'done',result);
                } catch(e) {
                    console.error(e);
                    const q=queue.find(x=>x.id===id);
                    if(q) q.status='error';
                    updateQueueCard(id,'error',null);
                }
            }

            document.getElementById('scanPulse').style.display='none';
            const done = queue.filter(x=>x.status==='done').length;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('queueTitle').textContent = `掃描完成 (${done}/${queue.length})`;
            if(done>0) document.getElementById('confirmBar').style.display='flex';

            document.getElementById('cameraInput').value='';
            document.getElementById('galleryInput').value='';
        }

        function addQueueCard({id,preview}) {
            const el=document.createElement('div');
            el.className='queue-card';
            el.id='qc-'+id;
            el.innerHTML=`<img src="${preview}" class="queue-img" alt=""> <div class="queue-body"><div class="scanning-pulse"><div class="pulse-dot"></div>AI 辨識中...</div></div>`;
            document.getElementById('queueList').prepend(el);
        }

        function confColor(c){
            return c>=80?'green':c>=50?'amber':'red';
        }

        function updateQueueCard(id,status,r){
            const el=document.getElementById('qc-'+id);
            if(!el) return;
            const body=el.querySelector('.queue-body');
            if(status==='done'&&r){
                body.innerHTML=`
                    <div class="queue-top">
                        <div class="queue-vendor">${r.vendor||'未知商家'}</div>
                        <div class="queue-amount">NT$ ${fmt(r.amount)}</div>
                    </div>
                    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${r.date||today()}${r.invoice_no?' ・ '+r.invoice_no:''}</div>
                    <div style="font-size:13px;color:#9ca3af;margin-bottom:8px">${r.description||''}</div>
                    <div>
                        <span class="badge badge-blue">${r.category||'其他'}</span>
                        <span class="badge badge-purple">${r.tax_type||'含稅'}</span>
                        <span class="badge badge-${confColor(r.confidence)}">信心 ${r.confidence||0}%</span>
                    </div>
                    <div style="text-align:right;margin-top:10px">
                        <button class="btn btn-ghost" onclick="removeQ(${id})">移除</button>
                    </div>
                `;
            } else if(status==='error'){
                body.innerHTML=`<div style="color:var(--red);font-size:13px">⚠️ 辨識失敗，請上傳較清晰的圖片</div>
                    <div style="text-align:right;margin-top:10px"><button class="btn btn-ghost" onclick="removeQ(${id})">移除</button></div>`;
            }
        }

        function removeQ(id){
            queue=queue.filter(x=>x.id!==id);
            const el=document.getElementById('qc-'+id);
            if(el) el.remove();
            if(!queue.length) document.getElementById('queueSection').style.display='none';
            const done=queue.filter(x=>x.status==='done').length;
            document.getElementById('doneCount').textContent=done;
            if(!done) document.getElementById('confirmBar').style.display='none';
        }

        async function confirmAll(){
            const applicant=document.getElementById('applicantInput').value.trim()||'未填';
            const newRecs=queue.filter(x=>x.status==='done'&&x.result).map(x=>({
                id:Date.now()+Math.random(),
                ...x.result,
                applicant,
                preview:x.preview,
                createdAt:new Date().toISOString()
            }));
            records=[...records,...newRecs];
            save();
            queue=[];
            document.getElementById('queueList').innerHTML='';
            document.getElementById('queueSection').style.display='none';
            document.getElementById('confirmBar').style.display='none';
            switchTab('records');

            showSyncToast('☁️ 同步到 Google 試算表中...');
            let ok=0, fail=0;
            for(const rec of newRecs){
                try{
                    const payload=JSON.stringify({
                        date:rec.date,applicant:rec.applicant,vendor:rec.vendor,
                        invoice_no:rec.invoice_no,category:rec.category,
                        description:rec.description,tax_type:rec.tax_type,
                        amount:rec.amount,confidence:rec.confidence
                    });
                    await fetch(GAS_URL,{
                        method:'POST',redirect:'follow',
                        headers:{'Content-Type':'application/x-www-form-urlencoded'},
                        body:'data='+encodeURIComponent(payload)
                    });
                    const idx=records.findIndex(r=>r.id===rec.id);
                    if(idx>-1 && !records[idx].seq){
                        records[idx].seq = records.filter(r=>r.seq).length + 1;
                    }
                    ok++;
                }catch(e){fail++;}
            }
            save();
            showSyncToast(fail===0?'✅ 已同步 '+ok+' 筆到 Google 試算表':'⚠️ 同步完成，'+fail+' 筆失敗');
        }

        // ════ Sync ════
        function showSyncToast(msg){
            let t=document.getElementById('syncToast');
            if(!t){
                t=document.createElement('div');
                t.id='syncToast';
                t.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;'+
                    'transform:translateX(-50%);background:#1a1d24;border:1px solid #2a2d35;color:#e8e6e0;'+
                    'padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;'+
                    'white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s;';
                document.body.appendChild(t);
            }
            t.textContent=msg;
            t.style.opacity='1';
            clearTimeout(t._timer);
            t._timer=setTimeout(()=>{ t.style.opacity='0'; },3500);
        }

        async function syncAllToSheet(){
            if(!records.length){ showSyncToast('⚠️ 沒有資料可同步'); return; }
            showSyncToast('☁️ 同步所有記錄中...');
            let ok=0,fail=0;
            for(const rec of records){
                try{
                    await fetch(GAS_URL,{
                        method:'POST',mode:'no-cors',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            date:rec.date,applicant:rec.applicant,vendor:rec.vendor,
                            invoice_no:rec.invoice_no,category:rec.category,
                            description:rec.description,tax_type:rec.tax_type,
                            amount:rec.amount,confidence:rec.confidence
                        })
                    });
                    ok++;
                }catch(e){fail++;}
            }
            showSyncToast(fail===0?'✅ 全部 '+ok+' 筆同步完成':'⚠️ 完成，'+fail+' 筆失敗');
        }

        // ════ AI（透過 Apps Script 中繼，API key 不暴露在前端）════
        async function toBase64(file){
            return new Promise((res,rej)=>{
                const r=new FileReader();
                r.onload=()=>{
                    // 轉為 URL-safe base64（+ → - , / → _ , 移除 =）
                    // 避免傳輸中 + 被解釋為空格導致 Gemini base64 解碼失敗
                    const raw = r.result.split(',')[1];
                    res(raw.replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''));
                };
                r.onerror=rej;
                r.readAsDataURL(file);
            });
        }

        async function compressImage(file, maxWidth=1024, quality=0.7){
            return new Promise((res)=>{
                const img=new Image();
                const url=URL.createObjectURL(file);
                img.onload=()=>{
                    let w=img.width, h=img.height;
                    if(w>maxWidth){ h=Math.round(h*maxWidth/w); w=maxWidth; }
                    const canvas=document.createElement('canvas');
                    canvas.width=w; canvas.height=h;
                    canvas.getContext('2d').drawImage(img,0,0,w,h);
                    URL.revokeObjectURL(url);
                    canvas.toBlob(blob=>res(blob),'image/jpeg',quality);
                };
                img.src=url;
            });
        }

        async function aiScan(b64, mime) {
            const prompt = '你是公司財務助理，請從這張收據/發票/憑證圖片中擷取資訊。\n' +
                '以 JSON 格式回傳，欄位：\n' +
                '{"date":"YYYY-MM-DD","vendor":"商家名稱","amount":數字,"tax_type":"含稅或未稅或免稅",' +
                '"description":"費用說明20字內","category":"從以下選一：' +
                CATS.join('、') + '",' +
                '"invoice_no":"發票號碼或空字串","confidence":0到100整數}\n只回傳JSON，不要其他文字。';

            const res = await fetch(GAS_URL, {
                method: 'POST',
                redirect: 'follow',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    action: 'scan',
                    image: b64,
                    mime: mime,
                    prompt: prompt
                })
            });

            const result = await res.json();
            console.log('AI scan raw:', JSON.stringify(result));

            if (result.error) throw new Error('Apps Script 錯誤：' + result.error);

            const rawText = result.text || '{}';
            console.log('Claude text:', rawText.slice(0, 300));
            showSyncToast('Claude: ' + rawText.slice(0, 80));

            const text = rawText.replace(/```json|```/g, '').trim();
            const match = text.match(/\{[\s\S]*\}/);
            if (!match) throw new Error('無法解析 AI 回傳：' + rawText.slice(0, 100));
            return JSON.parse(match[0]);
        }

        // ════ Records ════
        function buildFilters(){
            const months=[...new Set(records.map(r=>r.date?.slice(0,7)))].filter(Boolean).sort().reverse();
            const ms=document.getElementById('filterMonth'), mc=ms.value;
            ms.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}"${m===mc?' selected':''}>${monthOf(m+'-01')}</option>`).join('');

            const cs=document.getElementById('filterCat'), cc=cs.value;
            const cats=[...new Set(records.map(r=>r.category))].filter(Boolean);
            cs.innerHTML='<option value="">全部科目</option>'+cats.map(c=>`<option value="${c}"${c===cc?' selected':''}>${c}</option>`).join('');
        }

        function getFiltered(){
            const m=document.getElementById('filterMonth')?.value||'';
            const c=document.getElementById('filterCat')?.value||'';
            return records.filter(r=>
                (!currentEmployee || r.applicant === currentEmployee) &&
                (!m||r.date?.startsWith(m)) &&
                (!c||r.category===c)
            );
        }

        function renderRecords(){
            const fl=getFiltered();
            const total=fl.reduce((s,r)=>s+Number(r.amount||0),0);
            document.getElementById('recordSummary').textContent=fl.length?`共 ${fl.length} 筆 ・ 合計 NT$ ${fmt(total)}`:'';
            const list=document.getElementById('recordList');
            if(!fl.length){
                list.innerHTML=`<div class="empty"><div class="empty-icon">${records.length?'🔍':'📭'}</div>
                    <div class="empty-text">${records.length?'無符合篩選的記錄':'尚無報帳記錄<br>請先掃描上傳憑證'}</div></div>`;
                return;
            }
            list.innerHTML=[...fl].reverse().map(r=>`
                <div class="record-card">
                    ${r.preview?`<img src="${r.preview}" class="record-thumb" alt="">`:
                        `<div class="record-nothumb">🧾</div>`}
                    <div class="record-body">
                        <div class="record-top">
                            <div class="record-vendor">${r.vendor||'未知商家'}</div>
                            <div class="record-amount">NT$ ${fmt(r.amount)}</div>
                        </div>
                        <div class="record-desc">${r.description||''}</div>
                        <div>
                            <span class="badge badge-blue">${r.category}</span>
                            <span class="badge badge-purple">${r.tax_type||'含稅'}</span>
                            ${r.confidence?`<span class="badge badge-${confColor(r.confidence)}">${r.confidence}%</span>`:''}
                        </div>
                        <div class="record-foot">
                            <div class="record-meta">${r.date} ・ ${r.applicant}</div>
                            <div class="record-actions">
                                <button class="icon-btn" onclick="openEdit('${r.id}')" title="編輯">✏️</button>
                                <button class="icon-btn" onclick="delRecord('${r.id}')" title="刪除">🗑️</button>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function delRecord(id){
            if(!confirm('確定要刪除這筆記錄？')) return;
            const rec=records.find(r=>String(r.id)===String(id));
            records=records.filter(r=>String(r.id)!==String(id));
            save(); buildFilters(); renderRecords();
            if(rec&&rec.seq){
                showSyncToast('🗑️ 同步刪除中...');
                try{
                    await fetch(GAS_URL,{
                        method:'POST',mode:'no-cors',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({action:'delete',seq:rec.seq})
                    });
                    showSyncToast('✅ 已從 Google 試算表刪除');
                }catch(e){ showSyncToast('⚠️ 本機已刪除，試算表請手動刪除'); }
            } else {
                showSyncToast('✅ 已刪除（此筆未同步過）');
            }
        }

        // ════ Edit ════
        function openEdit(id){
            const r=records.find(x=>String(x.id)===String(id));
            if(!r) return;
            document.getElementById('editId').value=id;
            document.getElementById('editDate').value=r.date||today();
            document.getElementById('editAmount').value=r.amount||'';
            document.getElementById('editVendor').value=r.vendor||'';
            document.getElementById('editDesc').value=r.description||'';
            document.getElementById('editInvoice').value=r.invoice_no||'';
            document.getElementById('editApplicant').value=r.applicant||'';
            const cs=document.getElementById('editCat');
            cs.innerHTML=CATS.map(c=>`<option${c===r.category?' selected':''}>${c}</option>`).join('');
            document.getElementById('editTax').value=r.tax_type||'含稅';
            document.getElementById('editModal').style.display='flex';
        }

        function saveEdit(){
            const id=document.getElementById('editId').value;
            records=records.map(r=>String(r.id)!==String(id)?r:{...r,
                date:document.getElementById('editDate').value,
                amount:Number(document.getElementById('editAmount').value),
                vendor:document.getElementById('editVendor').value,
                description:document.getElementById('editDesc').value,
                category:document.getElementById('editCat').value,
                tax_type:document.getElementById('editTax').value,
                invoice_no:document.getElementById('editInvoice').value,
                applicant:document.getElementById('editApplicant').value,
            });
            save(); closeModal(); renderRecords();
        }

        function closeModal(){
            document.getElementById('editModal').style.display='none';
        }

        // ════ Stats ════
        function buildStatsFilter(){
            const months=[...new Set(records.map(r=>r.date?.slice(0,7)))].filter(Boolean).sort().reverse();
            const sel=document.getElementById('statsMonth'), cur=sel.value;
            sel.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}"${m===cur?' selected':''}>${monthOf(m+'-01')}</option>`).join('');
        }

        function renderStats(){
            const m=document.getElementById('statsMonth')?.value||'';
            const fl=records.filter(r=>
                (!currentEmployee || r.applicant === currentEmployee) &&
                (!m||r.date?.startsWith(m))
            );
            const total=fl.reduce((s,r)=>s+Number(r.amount||0),0);

            document.getElementById('kpiGrid').innerHTML=[
                {l:'總筆數',v:fl.length+' 筆',c:'var(--blue)'},
                {l:'總金額',v:'NT$ '+fmt(total),c:'var(--green)'},
                {l:'平均每筆',v:fl.length?'NT$ '+fmt(Math.round(total/fl.length)):'—',c:'var(--purple)'},
                {l:'科目種類',v:new Set(fl.map(r=>r.category)).size+' 種',c:'var(--amber)'},
            ].map(({l,v,c})=>`<div class="kpi-card"><div class="kpi-lbl">${l}</div><div class="kpi-val" style="color:${c}">${v}</div></div>`).join('');

            const cs=CATS.map(c=>({
                c,
                t:fl.filter(r=>r.category===c).reduce((s,r)=>s+Number(r.amount||0),0),
                n:fl.filter(r=>r.category===c).length
            })).filter(x=>x.n>0).sort((a,b)=>b.t-a.t);

            document.getElementById('catBars').innerHTML=cs.length?cs.map(({c,t,n})=>{
                const p=total>0?Math.round(t/total*100):0;
                return `<div class="bar-row">
                    <div class="bar-meta"><span class="bar-name">${c}</span><span class="bar-info">${n}筆 NT$ ${fmt(t)} <span style="color:var(--blue);font-weight:700">${p}%</span></span></div>
                    <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
                </div>`;
            }).join(''):'<div style="color:var(--muted);text-align:center;padding:24px">尚無資料</div>';

            const months=[...new Set(records.map(r=>r.date?.slice(0,7)))].filter(Boolean).sort();
            if(months.length>1){
                document.getElementById('monthCard').style.display='block';
                const maxA=Math.max(...months.map(mo=>records.filter(r=>r.date?.startsWith(mo)).reduce((s,r)=>s+Number(r.amount||0),0)));
                document.getElementById('monthBars').innerHTML=months.slice(-6).map(mo=>{
                    const a=records.filter(r=>r.date?.startsWith(mo)).reduce((s,r)=>s+Number(r.amount||0),0);
                    const h=maxA>0?Math.round(a/maxA*64):0;
                    return `<div class="month-col">
                        <div style="font-size:9px;color:var(--blue);margin-bottom:2px">${fmt(a)}</div>
                        <div class="month-bar" style="height:${h}px"></div>
                        <div class="month-lbl">${mo.slice(5)}月</div>
                    </div>`;
                }).join('');
            }
            document.getElementById('exportBtn').disabled=!fl.length;
        }

        // ════ Login ════
        async function fetchEmployees(){
            const sel = document.getElementById('loginSelect');
            try {
                const res = await fetch(GAS_URL, {
                    method:'POST', redirect:'follow',
                    headers:{'Content-Type':'text/plain'},
                    body: JSON.stringify({action:'employees'})
                });
                const data = await res.json();
                if(data.employees && data.employees.length){
                    sel.innerHTML = '<option value="">-- 請選擇姓名 --</option>' +
                        data.employees.map(e=>`<option value="${e}">${e}</option>`).join('');
                    document.getElementById('loginSub').textContent = '請選擇您的姓名';
                } else {
                    sel.innerHTML = '<option value="">（試算表尚未設定員工清單）</option>';
                    document.getElementById('loginSub').textContent = '請先在試算表建立員工清單';
                }
            } catch(e) {
                sel.innerHTML = '<option value="">載入失敗，請重新整理</option>';
                document.getElementById('loginSub').textContent = '無法連線，請檢查網路';
            }
        }

        function doLogin(){
            const code = document.getElementById('loginSelect').value.trim();
            if(!code){
                document.getElementById('loginSelect').style.borderColor='var(--red)';
                return;
            }
            document.getElementById('loginSelect').style.borderColor='';
            currentEmployee = code;
            localStorage.setItem('xp_employee', code);
            document.getElementById('loginOverlay').style.display='none';
            document.getElementById('applicantInput').value = code;
            document.getElementById('employeeLabel').textContent = '👤 ' + code;
            buildFilters();
            renderRecords();
            buildStatsFilter();
            renderStats();
            updateTotal();
        }

        function doLogout(){
            if(!confirm('確定要登出嗎？')) return;
            currentEmployee = '';
            localStorage.removeItem('xp_employee');
            document.getElementById('loginSelect').value = '';
            document.getElementById('loginSelect').style.borderColor='';
            document.getElementById('loginOverlay').style.display='flex';
            document.getElementById('applicantInput').value = '';
            document.getElementById('employeeLabel').textContent = '';
            fetchEmployees();
        }

        // ════ Load from Sheet ════
        async function loadFromSheet(){
            showSyncToast('📲 從 Google 試算表載入中...');
            try {
                const res = await fetch(GAS_URL, {
                    method:'POST', redirect:'follow',
                    headers:{'Content-Type':'text/plain'},
                    body: JSON.stringify({action:'load', applicant: currentEmployee || ''})
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                if(!data.records || !data.records.length){
                    showSyncToast('☁️ 試算表沒有資料');
                    return;
                }
                records = data.records;
                save();
                buildFilters();
                buildStatsFilter();
                renderRecords();
                renderStats();
                showSyncToast('✅ 已載入 ' + data.records.length + ' 筆資料');
            } catch(e) {
                showSyncToast('❌ 載入失敗：' + e.message);
            }
        }

        // ════ Export ════
        function exportExcel(){
            const m=document.getElementById('statsMonth')?.value||'';
            const fl=records.filter(r=>!m||r.date?.startsWith(m));
            if(!fl.length){alert('沒有可匯出的資料');return;}

            const detail=fl.map((r,i)=>({
                '序號':i+1,'日期':r.date,'申請人':r.applicant,
                '商家名稱':r.vendor||'','發票號碼':r.invoice_no||'',
                '費用科目':r.category,'說明／用途':r.description||'',
                '稅別':r.tax_type||'含稅','金額(NT$)':Number(r.amount||0),
                'AI信心度':r.confidence?r.confidence+'%':'',
            }));

            const sumRows=CATS.map(c=>({
                '費用科目':c,'筆數':fl.filter(r=>r.category===c).length,
                '小計(NT$)':fl.filter(r=>r.category===c).reduce((s,r)=>s+Number(r.amount||0),0)
            })).filter(x=>x['筆數']>0);
            sumRows.push({'費用科目':'── 合計 ──','筆數':fl.length,'小計(NT$)':fl.reduce((s,r)=>s+Number(r.amount||0),0)});

            const wb=XLSX.utils.book_new();
            const ws1=XLSX.utils.json_to_sheet(detail);
            const ws2=XLSX.utils.json_to_sheet(sumRows);
            ws1['!cols']=[{wch:5},{wch:12},{wch:10},{wch:18},{wch:14},{wch:14},{wch:24},{wch:8},{wch:12},{wch:10}];
            ws2['!cols']=[{wch:16},{wch:8},{wch:14}];
            XLSX.utils.book_append_sheet(wb,ws1,'費用明細');
            XLSX.utils.book_append_sheet(wb,ws2,'科目統計');
            const label=m?m.replace('-','年')+'月':'全部';
            XLSX.writeFile(wb,`費用報帳_${label}.xlsx`);
        }

        // ════ Init ════
        if(currentEmployee){
            document.getElementById('applicantInput').value = currentEmployee;
            document.getElementById('employeeLabel').textContent = '👤 ' + currentEmployee;
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            fetchEmployees();
        }
        updateTotal();

        // ════ Drag & Drop ════
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('over'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('over'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('over');
            handleFiles(e.dataTransfer.files);
        });
        dropZone.addEventListener('click', () => { document.getElementById('galleryInput').click(); });
    </script>
</body>
</html>
